<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph Coloring Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <header>
      <h1>Graph Coloring Lab</h1>
      <p>Backtracking solver visualizing NP-complete graph coloring with live constraint checks.</p>
    </header>

    <section class="controls">
      <label>Nodes <input id="nodeCount" type="range" min="6" max="16" value="11" /></label>
      <label>Edge Density <input id="density" type="range" min="10" max="70" value="34" /></label>
      <label>Colors (K) <input id="kColors" type="range" min="2" max="6" value="3" /></label>
      <label>Speed <input id="speed" type="range" min="1" max="100" value="64" /></label>
      <button id="randomize">Random Graph</button>
      <button id="solve">Solve</button>
      <button id="stop">Stop</button>
      <button id="clear">Clear Colors</button>
      <span id="status">Ready</span>
    </section>

    <canvas id="graph" width="1120" height="620"></canvas>

    <section class="metrics" id="metrics"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
